name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, x86, arm64]
        include:
          - platform: x64
            rid: win-x64
          - platform: x86
            rid: win-x86
          - platform: arm64
            rid: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Detect certificate secret
        id: certdetect
        shell: pwsh
        env:
          CERT_PFX: ${{ secrets.CERTIFICATE_PFX }}
        run: |
          if ($env:CERT_PFX -ne "") {
            echo "has_cert=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "has_cert=false" >> $env:GITHUB_OUTPUT
          }

      - name: Decode signing certificate
        if: steps.certdetect.outputs.has_cert == 'true'
        id: cert
        shell: pwsh
        env:
          CERT_PFX: ${{ secrets.CERTIFICATE_PFX }}
        run: |
          $certPath = "$env:RUNNER_TEMP\certificate.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:CERT_PFX))
          echo "path=$certPath" >> $env:GITHUB_OUTPUT

      - name: Generate self-signed certificate (no secret provided)
        if: steps.certdetect.outputs.has_cert == 'false'
        id: selfsign
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type Custom `
            -Subject "CN=Arthur Carrenho" `
            -KeyUsage DigitalSignature `
            -FriendlyName "Tid3" `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          $certPath = "$env:RUNNER_TEMP\certificate.pfx"
          $password = ConvertTo-SecureString -String "tid3build" -Force -AsPlainText
          Export-PfxCertificate -Cert $cert -FilePath $certPath -Password $password
          echo "path=$certPath" >> $env:GITHUB_OUTPUT
          echo "password=tid3build" >> $env:GITHUB_OUTPUT

      - name: Set certificate variables
        id: certinfo
        shell: pwsh
        env:
          CERT_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          if ("${{ steps.certdetect.outputs.has_cert }}" -eq "true") {
            echo "path=${{ steps.cert.outputs.path }}" >> $env:GITHUB_OUTPUT
            echo "password=$env:CERT_PASSWORD" >> $env:GITHUB_OUTPUT
          } else {
            echo "path=${{ steps.selfsign.outputs.path }}" >> $env:GITHUB_OUTPUT
            echo "password=${{ steps.selfsign.outputs.password }}" >> $env:GITHUB_OUTPUT
          }

      - name: Build & package
        shell: pwsh
        run: |
          dotnet publish TidalUi3.csproj `
            -c Release `
            -p:Platform=${{ matrix.platform }} `
            -p:RuntimeIdentifier=${{ matrix.rid }} `
            -p:PackageCertificateKeyFile="${{ steps.certinfo.outputs.path }}" `
            -p:PackageCertificatePassword="${{ steps.certinfo.outputs.password }}" `
            -p:AppxPackageDir="$env:GITHUB_WORKSPACE\packages\${{ matrix.platform }}\" `
            -p:UapAppxPackageBuildMode=SideloadOnly `
            -p:AppxBundle=Never

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tid3-${{ matrix.platform }}
          path: packages/${{ matrix.platform }}/**/*.msix
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tid3 ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/Tid3-x64/**/*.msix
            artifacts/Tid3-x86/**/*.msix
            artifacts/Tid3-arm64/**/*.msix
